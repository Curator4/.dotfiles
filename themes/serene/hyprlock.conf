general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor = DP-1
    blur_passes = 2
    blur_size = 7
}

background {
    monitor = DP-2
    blur_passes = 2
    blur_size = 7
}

background {
    monitor = DP-3
    path = ~/pictures/wallpapers/static/girl-vertical.jpg
    blur_passes = 2
    blur_size = 7
}

background {
    monitor = DP-4
    blur_passes = 2
    blur_size = 7
}

input-field {
    monitor = DP-3
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(30, 102, 245, 0.8)
    inner_color = rgba(239, 241, 246, 0.8)
    font_color = rgb(76, 79, 106)
    fade_on_empty = false
    placeholder_text = <span foreground="##4c4f6a">Enter Password...</span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    check_color = rgba(30, 102, 245, 1)
    fail_color = rgba(210, 15, 57, 1)
    fail_text = <span foreground="##d20f39">Authentication failed!</span>
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(76, 79, 106, 1)
    font_size = 120
    font_family = Hack Nerd Font
    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(76, 79, 106, 0.8)
    font_size = 24
    font_family = Hack Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor = DP-3
    text = $USER
    color = rgba(30, 102, 245, 1)
    font_size = 18
    font_family = Hack Nerd Font
    position = 0, -200
    halign = center
    valign = center
}
