# GrokNight - Neutral dark palette to match Grok Build TUI (groknight theme)
# Background forced to #131414 so it exactly matches what Grok paints inside.
# The `grok` fish wrapper opens a *new* Kitty window with tight 4px padding
# (only grok windows are affected; normal terminals keep your 14px).
# Use with theme-term.sh or just type `grok`.

foreground              #c8c8c8
background              #131414
selection_foreground    #131414
selection_background    #333A3E

# Black
color0  #1a1a1a
color8  #444444

# Red
color1  #905F59
color9  #BC8D73

# Green
color2  #5E8C9C
color10 #7BA6B5

# Yellow
color3  #D9C5A8
color11 #E6D7BE

# Blue
color4  #3D6390
color12 #6298D1

# Magenta (accent matches Grok's ~#7D4BC6)
color5  #7D4BC6
color13 #8a90dd

# Cyan
color6  #7297BB
color14 #9BB0D7

# White
color7  #c8c8c8
color15 #e0e0e0

# Cursor - Grok sets this via OSC but good to have close
cursor                  #7D4BC6
cursor_text_color       #171717

# URL underline color
url_color               #6298D1

# Hide tab bar for clean TUI edges/corners when in grok (no extra strip at bottom)
tab_bar_style hidden
