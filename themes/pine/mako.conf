# Mako notification daemon config - Pine theme

font=Hack Nerd Font 12
background-color=#050706F2
text-color=#E8ECE9
border-color=#10A37F
border-size=2
border-radius=4
padding=12
margin=10

width=350
height=150
anchor=top-right
default-timeout=5000
ignore-timeout=0

icons=1
max-icon-size=64
icon-path=/usr/share/icons/Adwaita

group-by=app-name
max-visible=5

[urgency=low]
border-color=#00B8B8
default-timeout=3000

[urgency=normal]
border-color=#10A37F
default-timeout=5000

[urgency=critical]
border-color=#FF6B5F
background-color=#190A09F2
default-timeout=0
