# Mako notification daemon config - neon theme
font=Hack Nerd Font 12
background-color=#0d1117E6
text-color=#d8e8ff
border-color=#00f0ff
border-size=2
border-radius=4
padding=12
margin=10
width=350
height=150
anchor=top-right
default-timeout=5000
ignore-timeout=0
icons=1
max-icon-size=64
icon-path=/usr/share/icons/Adwaita
group-by=app-name
max-visible=5

[urgency=low]
border-color=#00f0ff
default-timeout=3000

[urgency=normal]
border-color=#00f0ff
default-timeout=5000

[urgency=critical]
border-color=#ff2d95
background-color=#0d1117E6
default-timeout=0
