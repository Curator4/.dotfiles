# Stock tmux keybindings — anything a tutorial tells you to press will work.
#   prefix          C-b
#   panes           prefix + arrows | o | ;      splits: " below, % beside
#   even them out   prefix + M-2 (even-vertical), M-1 (even-horizontal), M-5 (tiled)
#   zoom / detach   prefix + z / d
#   reload config   prefix + R  (from tmux-sensible)

set -g mouse on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
