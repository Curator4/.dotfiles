# Font
font_family Hack Nerd Font
bold_italic_font auto
font_size 12

# Window
window_padding_width 14
hide_window_decorations yes
show_window_resize_notification no
confirm_os_window_close 0

# Keybindings
map F11 toggle_fullscreen
map ctrl+shift+equal     change_font_size all +2.0
map ctrl+shift+plus      change_font_size all +2.0
map ctrl+shift+minus     change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0

# Allow remote access
single_instance yes
allow_remote_control yes
listen_on unix:@mykitty

# Aesthetics
cursor_shape block
enable_audio_bell no

# Selection / clipboard
# Strips trailing padding spaces from copied text — fixes the "blocky" output
# from rendered quote/plan boxes that pad each line out to terminal width.
strip_trailing_spaces always
# Hold ctrl+alt while dragging to rectangle-select (skip the prefix gutter).
rectangle_select_modifiers ctrl+alt
# Optional QoL: also push selection to system clipboard, not just primary.
copy_on_select clipboard

# Minimal Tab bar styling
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# Import Jade color scheme
include ~/.dotfiles/themes/cyber/kitty.conf
