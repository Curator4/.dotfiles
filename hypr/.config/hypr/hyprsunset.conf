# hyprsunset — blue-light filter / display warming for Hyprland
#
# Daemon: systemctl --user {start,stop,restart,status} hyprsunset
#         Enabled on login via graphical-session.target (`systemctl --user enable hyprsunset`).
#         Apply changes to this file with `systemctl --user restart hyprsunset` — no auto-reload.
#
# IPC:    hyprctl hyprsunset temperature [K]   # get/set, e.g. 3500
#         hyprctl hyprsunset gamma [%]
#         hyprctl hyprsunset identity          # bypass all transforms
#
# Manual override:
#         Super+G        → warmer by 500K   (~/.bin/sunset-step warmer)
#         Super+Shift+G  → cooler by 500K   (~/.bin/sunset-step cooler)
#         Overrides are reset at the next profile boundary below — same UX as f.lux.
#
# Schedule rationale — values follow f.lux's "Recommended Colors" curve
# (day 6500K → twilight 3400K → bedtime 1900K). I stop at 2500K instead of
# going to 1900K because below 2500K colors get too distorted to read code.
# Profiles step rather than interpolate; one stop per ~hour is imperceptibly gradual.
# For true continuous fading, swap in `nerdshade` (AUR) on top of this daemon.
#
# Docs: https://wiki.hypr.land/Hypr-Ecosystem/hyprsunset/

# Daytime — no color shift
profile {
    time = 7:00
    identity = true
}

# Evening ramp — gradually warmer
profile {
    time = 18:00
    temperature = 5500
}

profile {
    time = 19:30
    temperature = 4500
}

profile {
    time = 21:00
    temperature = 3500
}

profile {
    time = 22:30
    temperature = 3000
}

# Late evening — close to bedtime
profile {
    time = 23:00
    temperature = 2500
}
