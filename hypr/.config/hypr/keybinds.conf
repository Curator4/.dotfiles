# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, exec, rofi -show drun
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, slash, exec, $fileManager
bind = $mainMod, D, exec, discord
bind = $mainMod, F, exec, $browser
bind = $mainMod, T, exec, ~/.bin/themis-entry --new-term
bind = $mainMod, N, exec, kitty nvim
bind = $mainMod, M, exec, $spotify
bind = $mainMod, O, exec, obsidian
bind = $mainMod, C, killactive,
bind = $mainMod, I, exec, kitty nvim +$ /home/curator/workspace/ai/household-oc/agents/tactical/data/itinerary.md
bind = $mainMod SHIFT, I, layoutmsg, togglesplit
bind = $mainMod, V, togglefloating,
bind = $mainMod, Escape, exit,
bind = , F11, fullscreen,

# Move focus with vim keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Swap windows with vim keys
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d

# Cycle through windows in current workspace
bind = $mainMod, TAB, cyclenext,
bind = $mainMod, TAB, bringactivetotop,

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshots
bind = $mainMod, S, exec, hyprshot -m region
bind = $mainMod SHIFT, S, exec, hyprshot -m output

# Screen recording (toggle: first press = pick region + start, second press = stop)
bind = $mainMod SHIFT, R, exec, ~/.bin/record-region

# Utilities
bind = $mainMod, P, exec, hyprlock
bind = $mainMod, U, exec, ~/.bin/cast-monitor
bind = $mainMod, Y, exec, $ssh
bind = $mainMod, period, exec, rofimoji --action copy
bind = $mainMod, B, exec, ~/.config/waybar/scripts/bluetooth-menu.sh
# Display warmth (hyprsunset) — manual override, auto-resets at next profile boundary.
# Schedule lives in ~/.config/hypr/hyprsunset.conf.
bind = $mainMod, G, exec, ~/.bin/sunset-step warmer
bind = $mainMod SHIFT, G, exec, ~/.bin/sunset-step cooler

# Per-terminal theme switch — reskins the FOCUSED kitty window (Super+F1..F12)
bind = $mainMod, F1,  exec, ~/.dotfiles/bin/.bin/theme-term.sh aegis
bind = $mainMod, F2,  exec, ~/.dotfiles/bin/.bin/theme-term.sh ashen
bind = $mainMod, F3,  exec, ~/.dotfiles/bin/.bin/theme-term.sh calliope
bind = $mainMod, F4,  exec, ~/.dotfiles/bin/.bin/theme-term.sh crimson-gray
bind = $mainMod, F5,  exec, ~/.dotfiles/bin/.bin/theme-term.sh cyber
bind = $mainMod, F6,  exec, ~/.dotfiles/bin/.bin/theme-term.sh ember
bind = $mainMod, F7,  exec, ~/.dotfiles/bin/.bin/theme-term.sh jade
bind = $mainMod, F8,  exec, ~/.dotfiles/bin/.bin/theme-term.sh lavender
bind = $mainMod, F9,  exec, ~/.dotfiles/bin/.bin/theme-term.sh mono
bind = $mainMod, F10, exec, ~/.dotfiles/bin/.bin/theme-term.sh neon
bind = $mainMod, F11, exec, ~/.dotfiles/bin/.bin/theme-term.sh nord
bind = $mainMod, F12, exec, ~/.dotfiles/bin/.bin/theme-term.sh serene

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Volume control with arrow keys
bindel = $mainMod, up, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = $mainMod, down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# Media controls with playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Arrow keys + space for media control
bind = $mainMod, left, exec, playerctl -p ncspot,spotify,firefox previous
bind = $mainMod, right, exec, playerctl -p ncspot,spotify,firefox next
bind = $mainMod, space, exec, playerctl -p ncspot,spotify,firefox play-pause

# TTS controls - no modifier needed, global hotkeys
bindl = , Insert, exec, python3 ~/workspace/ai/tts-daemon/tts_client.py kill
bindl = , Home, exec, python3 ~/workspace/ai/tts-daemon/tts_client.py pause

# Quick emoji shortcuts (Super + Ctrl + key) - types emoji directly
bind = $mainMod CTRL, J, exec, wtype "😂"  # joy
bind = $mainMod CTRL, R, exec, wtype "🤣"  # rofl
bind = $mainMod CTRL, C, exec, wtype "☕"  # coffee
bind = $mainMod CTRL, U, exec, wtype "🙃"  # upside down
bind = $mainMod CTRL, T, exec, wtype "🤔"  # thinking
bind = $mainMod CTRL, F, exec, wtype "🫡"  # salute
bind = $mainMod CTRL, P, exec, wtype "😔"  # pensive
bind = $mainMod CTRL, H, exec, wtype "😌"  # relieved
bind = $mainMod CTRL, E, exec, wtype "😎"  # rofl
bind = $mainMod CTRL, D, exec, wtype "🫤"  # rofl
bind = $mainMod CTRL, Y, exec, wtype "🥹"  # rofl
bind = $mainMod CTRL, Q, exec, wtype "😳"  # rofl
bind = $mainMod CTRL, S, exec, wtype "😭"  # rofl
bind = $mainMod CTRL, W, exec, wtype "👋"  # wave
bind = $mainMod CTRL, M, exec, wtype "😓"  # sweating
bind = $mainMod CTRL, X, exec, wtype "💀"  # rofl
bind = $mainMod CTRL, A, exec, wtype "😠"  # rofl
bind = $mainMod CTRL, L, exec, wtype "😈"  # rofl
bind = $mainMod CTRL, Z, exec, wtype "🤡"  # rofl
bind = $mainMod CTRL, B, exec, wtype "👍"  # rofl
bind = $mainMod CTRL, I, exec, wtype "🫵"  # point at you
bind = $mainMod CTRL, K, exec, wtype "👀"  # eyes
bind = $mainMod CTRL, 2, exec, wtype "🤦"  # facepalm
bind = $mainMod CTRL, O, exec, wtype "😮"  # surprised
bind = $mainMod CTRL, 4, exec, wtype "👌"  # ok
bind = $mainMod CTRL, G, exec, wtype "😼"  # smirking cat
bind = $mainMod CTRL, N, exec, wtype "😅"  # nervous
bind = $mainMod CTRL, V, exec, wtype "🤮"  # vomit
bind = $mainMod CTRL, 1, exec, wtype "😤"  # huffing
bind = $mainMod CTRL, 3, exec, wtype "🔥"  # fire
bind = $mainMod CTRL, semicolon, exec, wtype "æ"   # Danish æ
bind = $mainMod CTRL, apostrophe, exec, wtype "ø"  # Danish ø
bind = $mainMod CTRL, bracketleft, exec, wtype "å" # Danish å
bind = $mainMod CTRL, 6, exec, wtype "🤨"  # raised eyebrow
bind = $mainMod CTRL, 5, exec, wtype "✅"  # checkmark
