# Hyprland autostart config
#
# NOTE: With UWSM, autostart is handled by XDG autostart (~/.config/autostart/)
# This file is kept for Hyprland-specific exec-once commands that don't belong in XDG autostart
#
# Phone-facing Claude Code bots — panes in the "bots" workspace of the default
# herdr session (starts the server headless if needed). View: any terminal,
# `herdr`. Revive after a server stop: re-run `herdr-bots`.
exec-once = herdr-bots

# Household HUD — attention board panel on DP-4
exec-once = eww daemon
exec-once = sleep 2 && eww open hud
