# Hyprland autostart config
#
# NOTE: With UWSM, autostart is handled by XDG autostart (~/.config/autostart/)
# This file is kept for Hyprland-specific exec-once commands that don't belong in XDG autostart
#
# Phone-facing Claude Code bots. The --class flags let rules.conf pin them to
# workspace 9 (silent) deterministically — more reliable at boot than a
# [workspace …] exec dispatch (which races the window open). tmux for reattach:
#   tmux attach -t as_dev   (telegram, alarm-receiver, read-only dontAsk)
#   tmux attach -t io       (discord, auto mode)
exec-once = kitty --class as_dev_bot -e tmux new -A -s as_dev -c /home/curator/workspace/pnc/alarm-receiver fish -i -c cct
exec-once = kitty --class io_bot -e tmux new -A -s io -c /home/curator fish -i -c ccd
