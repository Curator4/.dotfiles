# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 5

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = $border_active
    col.inactive_border = $border_inactive

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 0

    # Change transparency of focused and unfocused windows
    # active_opacity = 0.95
    # inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = $shadow
    }

}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = slave    # new windows go into the right-side stack, not as a new master
    new_on_top = false    # append at bottom of stack
    mfact = 0.6           # master takes 60% of width
    orientation = left    # master on left, stack on right
    # Portrait monitors (DP-1/DP-4) override both via layoutopt in rules.conf.
    # mfact seeds a workspace at creation and is not re-applied on reload.
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}
