# Auto-generated by theme-render.sh. Layout is shared across all themes.
general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = themeLock, 0.2, 0.9, 0.2, 1
    animation = fade, 1, 2, themeLock
}

background {
    monitor = DP-1
    path = /home/curator/pictures/wallpapers/vertical/cyberpunk-rooftop.png
    blur_passes = 1
    blur_size = 3
    brightness = 0.95
    vibrancy = 0.22
}

background {
    monitor = DP-2
    path = /home/curator/pictures/wallpapers/static/late-night-desk.png
    blur_passes = 1
    blur_size = 3
    brightness = 0.95
    vibrancy = 0.22
}

background {
    monitor = DP-3
    path = /home/curator/pictures/wallpapers/static/hyprland-chan-default.png
    blur_passes = 1
    blur_size = 3
    brightness = 0.95
    vibrancy = 0.22
}

background {
    monitor = DP-4
    path = /home/curator/pictures/wallpapers/vertical/cyber-pylon-city.png
    blur_passes = 1
    blur_size = 3
    brightness = 0.95
    vibrancy = 0.22
}

input-field {
    monitor = DP-3
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(61, 99, 144, 0.88)
    inner_color = rgba(10, 19, 28, 0.82)
    font_color = rgba(160, 180, 197, 1.0)
    font_family = Hack Nerd Font
    fade_on_empty = false
    placeholder_text = <span foreground="#A0B4C5">Enter Password...</span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    check_color = rgba(94, 140, 156, 1.0)
    fail_color = rgba(144, 95, 89, 1.0)
    fail_text = <span foreground="#905F59">Authentication failed!</span>
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(160, 180, 197, 1.0)
    font_size = 120
    font_family = Hack Nerd Font
    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(160, 180, 197, 0.80)
    font_size = 24
    font_family = Hack Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor = DP-3
    text = $USER
    color = rgba(61, 99, 144, 0.88)
    font_size = 18
    font_family = Hack Nerd Font
    position = 0, -200
    halign = center
    valign = center
}
