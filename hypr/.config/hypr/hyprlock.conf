# Auto-generated by theme-render.sh. Layout is shared across all themes.
general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = themeLock, 0.16, 1, 0.3, 1
    animation = fade, 1, 5, themeLock
}

background {
    monitor = DP-1
    path = /home/curator/pictures/wallpapers/vertical/starry-night-figure.png
    blur_passes = 2
    blur_size = 5
    brightness = 0.82
    vibrancy = 0.16
}

background {
    monitor = DP-2
    path = /home/curator/pictures/wallpapers/static/orbital-shipyard.jpg
    blur_passes = 2
    blur_size = 5
    brightness = 0.82
    vibrancy = 0.16
}

background {
    monitor = DP-3
    path = /home/curator/pictures/wallpapers/static/orbital-shipyard.jpg
    blur_passes = 2
    blur_size = 5
    brightness = 0.82
    vibrancy = 0.16
}

background {
    monitor = DP-4
    path = /home/curator/pictures/wallpapers/vertical/space-planet-nebula.jpg
    blur_passes = 2
    blur_size = 5
    brightness = 0.82
    vibrancy = 0.16
}

input-field {
    monitor = DP-3
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(62, 111, 168, 0.88)
    inner_color = rgba(8, 9, 11, 0.82)
    font_color = rgba(180, 186, 194, 1.0)
    font_family = Hack Nerd Font
    fade_on_empty = false
    placeholder_text = <span foreground="##B4BAC2">Enter Password...</span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    check_color = rgba(98, 160, 184, 1.0)
    fail_color = rgba(100, 115, 168, 1.0)
    fail_text = <span foreground="##6473A8">Authentication failed!</span>
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(180, 186, 194, 1.0)
    font_size = 120
    font_family = Hack Nerd Font
    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(180, 186, 194, 0.80)
    font_size = 24
    font_family = Hack Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor = DP-3
    text = $USER
    color = rgba(62, 111, 168, 0.88)
    font_size = 18
    font_family = Hack Nerd Font
    position = 0, -200
    halign = center
    valign = center
}
