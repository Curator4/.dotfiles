input-field {
    monitor = DP-3
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(129, 161, 193, 0.88)
    inner_color = rgba(46, 52, 64, 0.82)
    font_color = rgba(216, 222, 233, 1.0)
    font_family = Hack Nerd Font
    fade_on_empty = false
    placeholder_text = <span foreground="##d8dee9">Enter Password...</span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    check_color = rgba(163, 190, 140, 1.0)
    fail_color = rgba(191, 97, 106, 1.0)
    fail_text = <span foreground="##BF616A">Authentication failed!</span>
}

label {
    monitor = DP-3
