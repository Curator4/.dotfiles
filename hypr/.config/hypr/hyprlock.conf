general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor = DP-1
    blur_passes = 2
    blur_size = 7
}

background {
    monitor = DP-2
    blur_passes = 2
    blur_size = 7
}

background {
    monitor = DP-3
    blur_passes = 2
    blur_size = 7
}

background {
    monitor = DP-4
    blur_passes = 2
    blur_size = 7
}

input-field {
    monitor = DP-3
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(132, 160, 198, 0.8)
    inner_color = rgba(22, 24, 33, 0.8)
    font_color = rgb(198, 200, 209)
    fade_on_empty = false
    placeholder_text = <span foreground="##c6c8d1">Enter Password...</span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    check_color = rgba(132, 160, 198, 1)
    fail_color = rgba(226, 120, 120, 1)
    fail_text = <span foreground="##e27878">Authentication failed!</span>
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(198, 200, 209, 1)
    font_size = 120
    font_family = Hack Nerd Font
    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(198, 200, 209, 0.8)
    font_size = 24
    font_family = Hack Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor = DP-3
    text = $USER
    color = rgba(132, 160, 198, 1)
    font_size = 18
    font_family = Hack Nerd Font
    position = 0, -200
    halign = center
    valign = center
}
