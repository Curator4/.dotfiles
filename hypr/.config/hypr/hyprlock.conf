# Auto-generated by theme-render.sh. Layout is shared across all themes.
general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = themeLock, 0.2, 0.9, 0.2, 1
    animation = fade, 1, 2, themeLock
}

background {
    monitor = DP-1
    path = /home/curator/pictures/wallpapers/vertical/gilded-knight.jpg
    blur_passes = 1
    blur_size = 3
    brightness = 0.95
    vibrancy = 0.22
}

background {
    monitor = DP-2
    path = /home/curator/pictures/wallpapers/static/pixel-alpine-village.png
    blur_passes = 1
    blur_size = 3
    brightness = 0.95
    vibrancy = 0.22
}

background {
    monitor = DP-3
    path = /home/curator/pictures/wallpapers/static/magic-portal-party.jpg
    blur_passes = 1
    blur_size = 3
    brightness = 0.95
    vibrancy = 0.22
}

background {
    monitor = DP-4
    path = /home/curator/pictures/wallpapers/vertical/sky-vertical.jpg
    blur_passes = 1
    blur_size = 3
    brightness = 0.95
    vibrancy = 0.22
}

input-field {
    monitor = DP-3
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(215, 153, 33, 0.88)
    inner_color = rgba(40, 40, 40, 0.82)
    font_color = rgba(235, 219, 178, 1.0)
    font_family = Hack Nerd Font
    fade_on_empty = false
    placeholder_text = <span foreground="##ebdbb2">Enter Password...</span>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    check_color = rgba(152, 151, 26, 1.0)
    fail_color = rgba(204, 36, 29, 1.0)
    fail_text = <span foreground="##cc241d">Authentication failed!</span>
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(235, 219, 178, 1.0)
    font_size = 120
    font_family = Hack Nerd Font
    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor = DP-3
    text = cmd[update:1000] echo "$(date +'%A, %B %d')"
    color = rgba(235, 219, 178, 0.80)
    font_size = 24
    font_family = Hack Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor = DP-3
    text = $USER
    color = rgba(215, 153, 33, 0.88)
    font_size = 18
    font_family = Hack Nerd Font
    position = 0, -200
    halign = center
    valign = center
}
